<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Correcta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Personal course simulator</p>
        <h1>Correcta</h1>
        <p id="courseDescription" class="muted">Loading course...</p>
      </div>
      <div class="grade-pill">
        <span>Average</span>
        <strong id="averageValue">--</strong>
        <small id="gpaValue">GPA --</small>
      </div>
    </header>

    <section class="control-card">
      <div>
        <p class="eyebrow">Current state</p>
        <h2 id="dayLabel">Day -- / 30</h2>
        <p class="muted" id="modeLabel">GitHub-first mode</p>
      </div>
      <div class="button-row">
        <button id="refreshBtn">Refresh</button>
        <a class="button ghost" id="repoLink" href="../" target="_blank">Repo root</a>
      </div>
    </section>

    <section id="finalEvaluation" class="final-card hidden"></section>

    <section class="grid" id="assignmentGrid"></section>

    <section class="log-card">
      <div class="section-head">
        <h2>System Log</h2>
        <p class="muted">Generated by scheduler / GitHub Actions.</p>
      </div>
      <div id="systemLog" class="log-list"></div>
    </section>
  </main>

  <dialog id="detailDialog">
    <article class="dialog-content">
      <button id="closeDialog" class="close-btn">×</button>
      <div id="dialogBody"></div>
    </article>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
