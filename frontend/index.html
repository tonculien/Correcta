<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Correcta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="hero card glow">
      <div>
        <p class="eyebrow">Correcta</p>
        <h1>Course Engine</h1>
        <p id="courseDescription" class="muted">Loading course...</p>
      </div>
      <div class="hero-side">
        <div class="stat">
          <span id="dayLabel">Day -- / --</span>
          <small id="modeLabel">Mode: --</small>
        </div>
        <div class="stat">
          <span id="averageValue">--</span>
          <small id="gpaValue">GPA --</small>
        </div>
        <button id="refreshBtn" class="button ghost">Refresh</button>
      </div>
      <div class="course-settings">
        <button id="courseSettingsBtn" class="settings-button" aria-label="Course settings" title="Course settings">⚙</button>
      </div>
    </section>

    <div id="courseManagerNotice" class="notice hidden floating-notice"></div>

    <section id="finalEvaluation" class="card hidden"></section>

    <section class="section-head">
      <div>
        <p class="eyebrow">Assignments</p>
        <h2>Course Work</h2>
      </div>
    </section>

    <section id="assignmentGrid" class="assignment-grid"></section>

    <section class="card">
      <div class="section-head">
        <div>
          <p class="eyebrow">System Log</p>
          <h2>Timeline</h2>
        </div>
      </div>
      <div id="systemLog" class="log-list"></div>
    </section>
  </main>

  <dialog id="detailDialog" class="dialog">
    <div class="dialog-frame">
      <button id="closeDialog" class="close" aria-label="Close">×</button>
      <div id="dialogBody"></div>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
